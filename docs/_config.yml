title: Excel 101 for Sales
description: A self-paced 4-hour Excel course for sales professionals. Modern formulas, pivot tables, dashboards — practical, no fluff.
author: scripts-and-tables
url: ""
baseurl: "/Excel-101"
github_repo: "https://github.com/scripts-and-tables/excel-101"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: "2..3"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - .sass-cache/
