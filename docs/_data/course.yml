title: "Excel for Sales"
subtitle: "From a raw Dubai sales export to answers for the VP — the whole workflow, in about 5 hours."
description: >-
  A hands-on Excel course for sales professionals who receive sales data and need to analyse
  it themselves. It follows one FMCG sales export — Food & HPC brands sold to Dubai supermarkets,
  with Sales and Returns — through the real analysis workflow: clean it, enrich it with VLOOKUP,
  summarise it with SUMIFS, pivot and rank it, and present a one-pager — then you run the whole
  thing yourself in a capstone. The 80% of Excel a sales team actually uses; no macros, Power
  Query, or dynamic-array gymnastics.
duration: "≈ 5 hours"
level: "Intermediate"
modules_count: 5
quiz_count: 30
files_count: 12

learning_outcomes:
  - "Clean a raw sales export into a trustworthy Table — TRIM/CLEAN, Find & Replace, VALUE/DATEVALUE, text functions, dedupe."
  - "Enrich it with VLOOKUP — each rep's manager & quota, and each brand's brand manager — and dodge VLOOKUP's six failures."
  - "Explore and summarise with AutoFilter, SUBTOTAL and SUMIFS/COUNTIFS/AVERAGEIFS — net sales, return rate, AOV, sales by manager."
  - "Reshape and rank with PivotTables and slicers — rep and brand-manager leaderboards."
  - "Present a one-page summary — then run the whole workflow yourself in a question-driven capstone."

modules:
  - number: 1
    slug: 01-receive-clean
    title: "Receive & clean"
    duration: "50 min"
    summary: "A supermarket sales export just landed. Turn it into a clean, trustworthy Excel Table before anything else."
    topics:
      - "Excel Table (Ctrl+T)"
      - "TRIM, CLEAN, Find & Replace"
      - "VALUE, DATEVALUE"
      - "Text functions (LEFT/MID/RIGHT, SUBSTITUTE, &)"
      - "Paste Special, dedupe, AED formats"
    icon: "table"

  - number: 2
    slug: 02-structure-enrich
    title: "Structure & enrich"
    duration: "45 min"
    summary: "Add the context the export is missing — sales managers, quotas and brand managers — with VLOOKUP."
    topics:
      - "VLOOKUP from Reps & Brands"
      - "Always FALSE (exact match)"
      - "The 6 failure modes + IFERROR"
      - "XLOOKUP — modern note"
    icon: "formula"

  - number: 3
    slug: 03-explore-summarize
    title: "Explore & summarize"
    duration: "60 min"
    summary: "Quick looks with filters and subtotals, then the SUMIFS trio and the sales KPIs."
    topics:
      - "AutoFilter, Status Bar, SUBTOTAL"
      - "SUMIFS / COUNTIFS / AVERAGEIFS"
      - "Net sales, return rate, AOV"
      - "Sales by manager, quota attainment"
    icon: "pivot"

  - number: 4
    slug: 04-pivot-rank
    title: "Pivot & rank"
    duration: "40 min"
    summary: "Reshape and slice the whole dataset in seconds with PivotTables — and rank reps and brand managers."
    topics:
      - "PivotTables, the 4 drop zones"
      - "Group dates, Show Values As %"
      - "Slicers & Report Connections"
      - "Rep & brand-manager leaderboards"
    icon: "chart"

  - number: 5
    slug: 05-present-capstone
    title: "Present & capstone"
    duration: "70 min"
    summary: "Make the numbers land on a one-page summary, then run the whole workflow yourself on a fresh file."
    topics:
      - "KPI one-pager + one chart"
      - "Conditional formatting"
      - "Keyboard cheat-sheet"
      - "Capstone: 11 questions on a fresh file"
    icon: "target"
